<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Orders - Order Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container py-5">
    <h1>Orders</h1>

    <div class="card mb-4">
        <div class="card-header">New Order</div>
        <div class="card-body">
            <form th:action="@{/orders/save}" th:object="${order}" method="post">
                <div class="row g-3">
                    <div class="col-md-2">
                        <label class="form-label">Stock Quote</label>
                        <input type="text" class="form-control" th:field="*{stockQuote}" required/>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Price</label>
                        <input type="number" step="0.0001" class="form-control" th:field="*{price}" required/>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Quantity</label>
                        <input type="number" class="form-control" th:field="*{quantity}" required/>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-control" th:field="*{date}"/>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Type</label>
                        <select class="form-select" th:field="*{orderType}">
                            <option value="BUY">BUY</option>
                            <option value="SELL">SELL</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Save Order</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Order ID</th>
            <th>Date</th>
            <th>Stock</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Type</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="o : ${orders}">
            <td th:text="${o.orderId}"/>
            <td th:text="${o.date}"/>
            <td th:text="${o.stockQuote}"/>
            <td th:text="${o.price}"/>
            <td th:text="${o.quantity}"/>
            <td th:text="${o.orderType}"/>
            <td th:text="${o.status}"/>
        </tr>
        <tr th:if="${#lists.isEmpty(orders)}">
            <td colspan="7" class="text-center text-muted">No orders yet. Add one above.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
