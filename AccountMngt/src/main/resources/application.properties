spring.application.name=AccountMngt

# Server - use port 8081 instead of default 8080
server.port=8081

# Database - H2 for development (in-memory)
spring.datasource.url=jdbc:h2:mem:accountmngt;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Optional: use MySQL instead - uncomment and comment H2 above
# spring.datasource.url=jdbc:mysql://localhost:3306/accountmngt
# spring.datasource.username=root
# spring.datasource.password=yourpassword
