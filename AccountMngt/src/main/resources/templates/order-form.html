<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create Order - AccountMngt</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container py-5">
    <h1>Create New Reservation</h1>
    
    <div class="mb-4">
        <a th:href="@{/}" class="btn btn-secondary">Home</a>
        <a th:href="@{/orders}" class="btn btn-info text-white">View Transactions</a>
    </div>

    <div class="card mb-4">
        <div class="card-header">Reservation Form</div>
        <div class="card-body">
            <form th:action="@{/orders/create}" method="post">
                <div class="row g-3">
                    <div class="col-md-2">
                        <label class="form-label">Order Ref ID</label>
                        <input type="text" class="form-control" name="orderId" required />
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Price</label>
                        <input type="number" step="0.01" class="form-control" name="price" required/>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Quantity</label>
                        <input type="number" class="form-control" name="quantity" required/>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Account ID</label>
                        <input type="text" class="form-control" name="accountId"/>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Stock Ref</label>
                        <input type="text" class="form-control" name="stockId"/>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Type</label>
                        <select class="form-select" name="orderType">
                            <option value="SELL">SELL</option>
                            <option value="BUY">BUY</option>
                        </select>
                    </div>
                    <div class="col-md-12 text-end">
                        <button type="submit" class="btn btn-primary mt-3">Save Reservation</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
