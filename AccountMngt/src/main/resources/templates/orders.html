<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Transactions - Account Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container py-5">
    <h1>Account Transactions</h1>

    <div th:if="${message}" class="alert alert-success" role="alert" th:text="${message}"></div>

    <div class="mb-4">
        <a th:href="@{/}" class="btn btn-secondary">Home</a>
    </div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Order Ref ID</th>
            <th>Date</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Account</th>
            <th>Stock Ref</th>
            <th>Type</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.orderId}">-</td>
            <td th:text="${#temporals.format(order.date, 'yyyy-MM-dd HH:mm')}">-</td>
            <td th:text="${order.price}">-</td>
            <td th:text="${order.quantity}">-</td>
            <td th:text="${order.accountId}">-</td>
            <td th:text="${order.stockId}">-</td>
            <td th:text="${order.orderType}">-</td>
        </tr>
        <tr th:if="${#lists.isEmpty(orders)}">
            <td colspan="7" class="text-center text-muted">No orders found.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
